<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepa Pig - Salta Charcos!</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF9EC8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pepa Pig">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { display: block; touch-action: none; cursor: pointer; }
  #rotate {
    display: none;
    position: fixed;
    inset: 0;
    background: #FF9EC8;
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: white;
    text-align: center;
    gap: 20px;
    font-family: 'Comic Sans MS', cursive;
  }
  #rotate span { font-size: 5rem; animation: spin 1.5s ease-in-out infinite alternate; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(90deg); } }
  @media (orientation: portrait) { #rotate { display: flex; } }
</style>
</head>
<body>
<div id="rotate"><span>📱</span>Gira el celular!</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// Canvas interno siempre 2:1
const W = 800, H = 400;
canvas.width  = W;
canvas.height = H;

function resize() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  // Escalar manteniendo 2:1, ocupando toda la pantalla
  const scale = Math.min(sw / W, sh / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

const GROUND = H - 80;
const FONT   = "'Comic Sans MS', cursive";

// ── Estado global ────────────────────────────────────────────────────────────
let state     = 'char_select';
let character = 'peppa';
let mode      = 'charcos';
let score     = 0;
let combo     = 1;
let lives     = 3;
let frame     = 0;
const highScore = { peppa_charcos:0, peppa_lodo:0, george_charcos:0, george_lodo:0 };

const hero = { x:150, y:GROUND, vy:0, jumping:false, legPhase:0 };
let puddles = [], particles = [], popups = [];
let nextPuddle = 120, speed = 2.5;

// Cajas de selección (en coords canvas 800x400)
const BOX_CHAR = {
  peppa:  { x:110, y:70, w:220, h:250 },
  george: { x:470, y:70, w:220, h:250 },
};
const BOX_MODE = {
  charcos: { x:80,  y:80, w:250, h:220 },
  lodo:    { x:470, y:80, w:250, h:220 },
};

// ── Input ────────────────────────────────────────────────────────────────────
function canvasPos(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = W / r.width;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return { x: cx * sx, y: cy * sx };
}
function inBox(p, b) { return p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }

function handleInput(pos) {
  if (state === 'char_select') {
    if (inBox(pos, BOX_CHAR.peppa))  { character='peppa';  state='mode_select'; }
    if (inBox(pos, BOX_CHAR.george)) { character='george'; state='mode_select'; }
    return;
  }
  if (state === 'mode_select') {
    if (inBox(pos, BOX_MODE.charcos)) { mode='charcos'; startWaiting(); }
    if (inBox(pos, BOX_MODE.lodo))    { mode='lodo';    startWaiting(); }
    return;
  }
  if (state === 'waiting') { state='playing'; return; }
  if (state === 'dead')    { goCharSelect(); return; }
  if (state === 'playing' && !hero.jumping) { hero.vy=-18; hero.jumping=true; }
}

canvas.addEventListener('click',      e => handleInput(canvasPos(e)));
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(canvasPos(e)); });
document.addEventListener('keydown',  e => { if(e.code==='Space') handleInput({x:0,y:0}); });

function startWaiting() {
  hero.y=GROUND; hero.vy=0; hero.jumping=false; hero.legPhase=0;
  puddles=[]; particles=[]; popups=[];
  nextPuddle=150; speed=2.5; score=0; combo=1; lives=3; frame=0;
  state='waiting';
}
function goCharSelect() {
  state='char_select'; particles=[]; popups=[];
}

// ── Partículas ───────────────────────────────────────────────────────────────
const MUD_COLORS = ['#7B4A1E','#9B6234','#5C3010','#C08040','#A0522D','#6B3A0E'];

function spawnMud(cx, cy, count, big) {
  for (let i=0; i<count; i++) {
    const angle = -Math.PI * (0.1 + Math.random() * 0.8);
    const spd   = big ? 4+Math.random()*11 : 2+Math.random()*6;
    const side  = Math.random() > 0.5 ? 1 : -1;
    particles.push({
      x: cx+(Math.random()-0.5)*24, y: cy,
      vx: Math.cos(angle)*spd*side,
      vy: Math.sin(angle)*spd-1,
      r:  big ? 5+Math.random()*10 : 2+Math.random()*6,
      color: MUD_COLORS[Math.floor(Math.random()*MUD_COLORS.length)],
      life: 1.0, decay: 0.016+Math.random()*0.018,
    });
  }
}
function updateParticles() {
  for (let p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.4; p.life-=p.decay; }
  particles = particles.filter(p => p.life > 0);
}
function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Popups ───────────────────────────────────────────────────────────────────
function addPopup(text, x, y, color) {
  popups.push({ text, x, y, color, life:1.0, vy:-1.5 });
}
function updatePopups() {
  for (let p of popups) { p.y+=p.vy; p.life-=0.02; }
  popups = popups.filter(p => p.life > 0);
}
function drawPopups() {
  for (let p of popups) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = `bold 34px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ── Personaje ────────────────────────────────────────────────────────────────
function drawCharacter(x, y, legPhase, jumping, outfitColor, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const swing = jumping ? 0 : Math.sin(legPhase) * 10;
  const pink='#FF9EC8', darkPink='#FF6BAA', nose='#CC3377', shoe='#111';

  // Cola
  ctx.strokeStyle=pink; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-24,-32,7,0.2,3.5,false); ctx.stroke();
  ctx.beginPath(); ctx.arc(-27,-26,4,-1,1.5,false); ctx.stroke();

  // Pierna trasera
  ctx.fillStyle=pink;
  ctx.save(); ctx.translate(-12,-6); ctx.rotate(swing*0.04);
  ctx.beginPath(); ctx.roundRect(-5,0,10,26,4); ctx.fill();
  ctx.fillStyle=shoe; ctx.beginPath(); ctx.ellipse(0,27,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Pierna delantera
  ctx.fillStyle=pink;
  ctx.save(); ctx.translate(8,-6); ctx.rotate(-swing*0.04);
  ctx.beginPath(); ctx.roundRect(-5,0,10,26,4); ctx.fill();
  ctx.fillStyle=shoe; ctx.beginPath(); ctx.ellipse(2,27,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Cuerpo
  ctx.fillStyle=outfitColor;
  ctx.beginPath(); ctx.ellipse(0,-30,22,26,0,0,Math.PI*2); ctx.fill();

  // Cuello
  ctx.fillStyle=pink;
  ctx.beginPath(); ctx.ellipse(4,-54,9,6,0,0,Math.PI*2); ctx.fill();

  // Brazo trasero
  ctx.fillStyle=pink;
  ctx.save(); ctx.translate(-16,-36); ctx.rotate(-swing*0.03-0.2);
  ctx.beginPath(); ctx.roundRect(-4,0,8,18,4); ctx.fill(); ctx.restore();

  // Brazo delantero
  ctx.fillStyle=pink;
  ctx.save(); ctx.translate(16,-36); ctx.rotate(swing*0.03+0.2);
  ctx.beginPath(); ctx.roundRect(-4,0,8,18,4); ctx.fill(); ctx.restore();

  // Cabeza
  ctx.fillStyle=pink;
  ctx.beginPath(); ctx.arc(6,-68,22,0,Math.PI*2); ctx.fill();

  // Orejas
  ctx.fillStyle=pink; ctx.beginPath(); ctx.arc(-10,-88,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=darkPink; ctx.beginPath(); ctx.arc(-10,-88,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pink; ctx.beginPath(); ctx.arc(12,-89,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=darkPink; ctx.beginPath(); ctx.arc(12,-89,6,0,Math.PI*2); ctx.fill();

  // Hocico
  ctx.fillStyle=darkPink; ctx.beginPath(); ctx.ellipse(26,-64,12,9,-0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=nose;
  ctx.beginPath(); ctx.arc(21,-65,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30,-62,3,0,Math.PI*2); ctx.fill();

  // Ojos
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-2,-74,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';  ctx.beginPath(); ctx.arc(-1,-73,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(0,-75,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(12,-76,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';  ctx.beginPath(); ctx.arc(13,-75,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(14,-77,1.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawHero() {
  if (character==='peppa') drawCharacter(hero.x, hero.y, hero.legPhase, hero.jumping, '#EE1C25', 1.3);
  else                     drawCharacter(hero.x, hero.y, hero.legPhase, hero.jumping, '#2B6EC8', 1.1);
}

// ── Charco ───────────────────────────────────────────────────────────────────
function drawPuddle(x, w) {
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x+w/2,GROUND+18,w/2+4,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7B4A1E';
  ctx.beginPath(); ctx.ellipse(x+w/2,GROUND+10,w/2,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9B6234';
  ctx.beginPath(); ctx.ellipse(x+w/2,GROUND+8,w/2-5,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,150,0.22)';
  ctx.beginPath(); ctx.ellipse(x+w/2-8,GROUND+5,w/4,5,-0.3,0,Math.PI*2); ctx.fill();
}

// ── Fondo ─────────────────────────────────────────────────────────────────────
function drawBg(mudMode) {
  const grad = ctx.createLinearGradient(0,0,0,GROUND);
  grad.addColorStop(0, mudMode ? '#B0966E' : '#87CEEB');
  grad.addColorStop(1, mudMode ? '#D4B896' : '#C9E8FF');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  if (!mudMode) {
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(730,55,48,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFE44D'; ctx.beginPath(); ctx.arc(730,55,38,0,Math.PI*2); ctx.fill();
    drawCloud(100,55,frame*0.18);
    drawCloud(380,70,frame*0.12);
    drawCloud(600,45,frame*0.22);
    ctx.fillStyle='#6CC741'; ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.fillStyle='#55A832'; ctx.fillRect(0,GROUND,W,12);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(0,GROUND+12,W,5);
  } else {
    ctx.fillStyle='#A0522D'; ctx.beginPath(); ctx.arc(730,55,48,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#C07840'; ctx.beginPath(); ctx.arc(730,55,38,0,Math.PI*2); ctx.fill();
    drawMudCloud(100,55,frame*0.14);
    drawMudCloud(380,70,frame*0.10);
    drawMudCloud(600,45,frame*0.18);
    ctx.fillStyle='#7B4A1E'; ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.fillStyle='#9B6234'; ctx.fillRect(0,GROUND,W,12);
    for (let bx=0; bx<W; bx+=110) {
      ctx.fillStyle='#5C3010';
      ctx.beginPath(); ctx.ellipse(bx+50,GROUND+26,38,10,0,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawCloud(bx,y,off) {
  const x=((bx-off)%(W+250)+W+250)%(W+250)-120;
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.arc(x,y,34,0,Math.PI*2); ctx.arc(x+40,y-12,40,0,Math.PI*2); ctx.arc(x+78,y,30,0,Math.PI*2);
  ctx.fill();
}
function drawMudCloud(bx,y,off) {
  const x=((bx-off)%(W+250)+W+250)%(W+250)-120;
  ctx.fillStyle='#C4956A';
  ctx.beginPath();
  ctx.arc(x,y,32,0,Math.PI*2); ctx.arc(x+38,y-10,36,0,Math.PI*2); ctx.arc(x+72,y,28,0,Math.PI*2);
  ctx.fill();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  const label = mode==='charcos' ? 'Charcos' : 'Splashes';
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(12,12,200,46,12); ctx.fill();
  ctx.fillStyle='white'; ctx.font=`bold 28px ${FONT}`;
  ctx.textAlign='left';
  ctx.fillText(`${label}: ${score}`, 24, 46);

  if (combo > 1) {
    const comboColor = combo > 4 ? '#FF6600' : '#FFD700';
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.roundRect(12,66,160,40,12); ctx.fill();
    ctx.fillStyle=comboColor; ctx.font=`bold 24px ${FONT}`;
    ctx.fillText(`Combo x${combo}!`, 22, 96);
  }

  if (mode==='lodo') {
    for (let i=0; i<3; i++) drawHeart(W-48-i*36, 18, i < lives);
  } else {
    const hsKey=`${character}_${mode}`;
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.roundRect(W-210,12,198,46,12); ctx.fill();
    ctx.fillStyle='white'; ctx.font=`20px ${FONT}`;
    ctx.textAlign='right';
    ctx.fillText(`Record: ${highScore[hsKey]}`, W-18, 44);
  }
  ctx.textAlign='left';
}

function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? '#EE1C25' : 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(x, y+5);
  ctx.bezierCurveTo(x,y-3,x-13,y-3,x-13,y+5);
  ctx.bezierCurveTo(x-13,y+13,x,y+20,x,y+20);
  ctx.bezierCurveTo(x,y+20,x+13,y+13,x+13,y+5);
  ctx.bezierCurveTo(x+13,y-3,x,y-3,x,y+5);
  ctx.fill();
}

// ── Pantallas de selección ────────────────────────────────────────────────────
function drawCharSelect() {
  drawBg(false);
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='white'; ctx.font=`bold 42px ${FONT}`;
  ctx.textAlign='center'; ctx.fillText('Elige tu personaje!', W/2, 56);

  for (const [key, b] of Object.entries(BOX_CHAR)) {
    const isPeppa   = key==='peppa';
    const color     = isPeppa ? '#EE1C25' : '#2B6EC8';
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,22); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=6;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,22); ctx.stroke();
    drawCharacter(b.x+b.w/2-10, b.y+b.h-36, frame*0.06, false,
      isPeppa?'#EE1C25':'#2B6EC8', isPeppa?1.3:1.1);
    ctx.fillStyle=color; ctx.font=`bold 28px ${FONT}`;
    ctx.textAlign='center';
    ctx.fillText(isPeppa?'Pepa':'George', b.x+b.w/2, b.y+b.h-6);
  }
  ctx.textAlign='left';
}

function drawModeSelect() {
  drawBg(false);
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='white'; ctx.font=`bold 40px ${FONT}`;
  ctx.textAlign='center'; ctx.fillText('Como queres jugar?', W/2, 56);

  const bc=BOX_MODE.charcos;
  ctx.fillStyle='rgba(200,240,200,0.92)';
  ctx.beginPath(); ctx.roundRect(bc.x,bc.y,bc.w,bc.h,22); ctx.fill();
  ctx.strokeStyle='#55A832'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.roundRect(bc.x,bc.y,bc.w,bc.h,22); ctx.stroke();
  drawCharacter(bc.x+bc.w/2-10, bc.y+bc.h-36, 0, true,
    character==='peppa'?'#EE1C25':'#2B6EC8', 1.0);
  ctx.fillStyle='#2E7D32'; ctx.font=`bold 24px ${FONT}`;
  ctx.textAlign='center';
  ctx.fillText('Saltar Charcos!', bc.x+bc.w/2, bc.y+bc.h-4);

  const bl=BOX_MODE.lodo;
  ctx.fillStyle='rgba(200,160,100,0.92)';
  ctx.beginPath(); ctx.roundRect(bl.x,bl.y,bl.w,bl.h,22); ctx.fill();
  ctx.strokeStyle='#7B4A1E'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.roundRect(bl.x,bl.y,bl.w,bl.h,22); ctx.stroke();
  drawCharacter(bl.x+bl.w/2-10, bl.y+bl.h-36, 0, false,
    character==='peppa'?'#EE1C25':'#2B6EC8', 1.0);
  ctx.fillStyle='#7B4A1E'; ctx.font=`bold 24px ${FONT}`;
  ctx.textAlign='center';
  ctx.fillText('Saltar en el Lodo!', bl.x+bl.w/2, bl.y+bl.h-4);

  ctx.textAlign='left';
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  frame++;
  if (state !== 'playing') return;

  const wasJumping = hero.jumping;
  hero.vy += 0.7;
  hero.y  += hero.vy;
  let justLanded = false;
  if (hero.y >= GROUND) {
    hero.y=GROUND; hero.vy=0;
    if (wasJumping) justLanded=true;
    hero.jumping=false;
  }
  if (!hero.jumping) hero.legPhase += 0.18;

  updateParticles();
  updatePopups();

  nextPuddle--;
  if (nextPuddle <= 0) {
    const w = mode==='lodo' ? 70+Math.random()*60 : 50+Math.random()*55;
    puddles.push({ x:W+10, w, passed:false, scored:false, missed:false });
    const base = mode==='lodo' ? 180 : 150;
    nextPuddle = Math.max(base + Math.random()*70 - score*0.7, mode==='lodo'?120:80);
  }

  for (let p of puddles) p.x -= speed;
  puddles = puddles.filter(p => p.x+p.w > -20);

  speed = 2.5 + frame*0.0012 + score*0.04;

  const hsKey = `${character}_${mode}`;

  if (mode === 'charcos') {
    for (let p of puddles) {
      if (!p.passed && p.x+p.w < hero.x-10) {
        p.passed=true;
        score += combo;
        addPopup(combo > 1 ? `+${combo} x${combo}!` : `+1`, hero.x, GROUND-80, combo > 2 ? '#FF6600' : '#FFD700');
        combo++;
      }
      const hit = hero.x+15>p.x+8 && hero.x-15<p.x+p.w-8 && hero.y>GROUND-10;
      if (hit) {
        spawnMud(hero.x, GROUND, 28, true);
        addPopup('SPLASH!', hero.x, GROUND-80, '#FFD700');
        if (score>highScore[hsKey]) highScore[hsKey]=score;
        state='dead';
        return;
      }
    }
  } else {
    if (justLanded) {
      let hit=false;
      for (let p of puddles) {
        if (!p.scored && hero.x+20>p.x+5 && hero.x-20<p.x+p.w-5) {
          p.scored=true; hit=true;
          score += combo;
          spawnMud(hero.x, GROUND, 35, true);
          addPopup(combo > 1 ? `SPLASH! x${combo}` : 'SPLASH!', hero.x, GROUND-80, combo > 2 ? '#FF6600' : '#FFD700');
          combo++;
        }
      }
      if (!hit) spawnMud(hero.x, GROUND, 5, false);
    }
    for (let p of puddles) {
      if (!p.scored && !p.missed && p.x+p.w < hero.x-5) {
        p.missed=true; lives--; combo=1;
        addPopup('Oops!', hero.x, GROUND-70, '#FF4444');
        if (lives<=0) {
          if (score>highScore[hsKey]) highScore[hsKey]=score;
          state='dead';
          return;
        }
      }
    }
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);

  if (state==='char_select') { drawCharSelect(); return; }
  if (state==='mode_select') { drawModeSelect(); return; }

  const isMud = mode==='lodo';
  drawBg(isMud);
  for (let p of puddles) drawPuddle(p.x, p.w);
  drawHero();
  drawParticles();
  drawPopups();
  drawHUD();

  if (state==='waiting') {
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='white'; ctx.font=`bold 48px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(isMud?'Salta en el Lodo!':'Salta los Charcos!', W/2, H/2-10);
    ctx.font=`28px ${FONT}`;
    ctx.fillText('Toca para empezar', W/2, H/2+40);
    ctx.textAlign='left';
  }

  if (state==='dead') {
    ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='white'; ctx.font=`bold 44px ${FONT}`; ctx.textAlign='center';
    ctx.fillText(`${isMud?'Splashes':'Charcos'}: ${score}`, W/2, H/2-20);
    ctx.font=`28px ${FONT}`;
    ctx.fillText(`Record: ${highScore[`${character}_${mode}`]}`, W/2, H/2+26);
    ctx.font=`22px ${FONT}`;
    ctx.fillText('Toca para elegir personaje', W/2, H/2+70);
    ctx.textAlign='left';
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
